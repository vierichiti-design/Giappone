    function renderJapanese() {
        const el = document.getElementById('content');
        const categories = [...new Set(JP_WORDS.map(w => w.cat))];
        el.innerHTML = `<div class="jp-section">` +
            categories.map(cat => {
                const words = JP_WORDS.filter(w => w.cat === cat);
                const isTop = cat === '⭐ Frasi Top';
                return `<div class="jp-category">${cat}</div>` +
                    words.map(w => `
                    <div class="jp-card">
                        <div class="jp-italian">${w.it}</div>
                        <div class="jp-text">
                            ${isTop ? `<div class="jp-romaji" style="font-size:14px;font-weight:600;color:#333;margin-bottom:2px;">${w.rom}</div>` : ''}
                            <div class="jp-kanji">${w.jp}</div>
                            ${!isTop ? `<div class="jp-romaji">${w.rom}</div>` : ''}
                        </div>
                        <button class="jp-speak" onclick="speakJapanese('${w.jp.replace(/'/g, "\'")}')" title="Ascolta">🔊</button>
                    </div>`).join('');
            }).join('') + `</div>`;
    }

    function speakJapanese(text) {
        if (!window.speechSynthesis) { alert('Sintesi vocale non supportata'); return; }
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ja-JP';
        utt.rate = 0.85;
        const voices = window.speechSynthesis.getVoices();
        const jpVoice = voices.find(v => v.lang.startsWith('ja'));
        if (jpVoice) utt.voice = jpVoice;
        window.speechSynthesis.speak(utt);
    }

    function selectTab(name) {
        const tabs = document.querySelectorAll('.tab');
        let found = false;
        tabs.forEach(t => {
            t.classList.remove('active');
            if (t.textContent.trim() === name) { t.classList.add('active'); found = true; }
        });
        currentSheet = name;
        currentData = allData[name] || [];
        document.getElementById('search').value = '';
        if (name === '🗣️ Parole Utili') {
            renderJapanese();
        } else if (name === 'Shopping') {
            renderShopping(currentData);
        } else if (MAPS[name]) {
            renderMap(MAPS[name]);
        } else if (MAPS_WITH_TABLE[name]) {
            const cfg = MAPS_WITH_TABLE[name];
            renderMapWithTable(cfg.mid, allData[cfg.sheet] || [], cfg.hasGroups || false);
        } else if (MULTI_MAPS[name]) {
            renderMultiMap(MULTI_MAPS[name], allData['Tokyo 20 marzo'] || []);
        } else if (name === 'Programma Finale') {
            renderProgramma(currentData);
        } else if (name === 'Ristoranti confermati') {
            const sorted = [...currentData].sort((a, b) => {
                const da = parseFloat(a['Booking'] || 0);
                const db = parseFloat(b['Booking'] || 0);
                return da - db;
            });
            renderCards(sorted);
        } else {
            renderCards(currentData);
        }
    }

    const CACHE_KEY = 'giappone_data_v1';

    async function loadData(forceRefresh = false) {
        // Prova a usare la cache se non è un refresh forzato
        if (!forceRefresh) {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    allData = JSON.parse(cached);
                    renderTabs();
                    return;
                }
            } catch(e) {}
        }

        document.getElementById('content').innerHTML = '<div class="loading">⏳ Caricamento dati...</div>';

        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const buffer = await res.arrayBuffer();
            const wb = XLSX.read(buffer, { type: 'array' });

            const EXCLUDE_TABS = ['Foglio1', 'Ristoranti'];
            allData = {};
            wb.SheetNames.forEach(name => {
                if (EXCLUDE_TABS.includes(name)) return;
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: '' });
                if (rows.length) allData[name] = rows;
            });

            // Salva in cache
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(allData)); } catch(e) {}

            renderTabs();
        } catch (e) {
            document.getElementById('content').innerHTML = `
                <div class="banner">
                    ❌ <strong>Errore caricamento:</strong> ${e.message}<br><br>
                    Verifica che il foglio Google Sheets sia condiviso come
                    <em>"Chiunque abbia il link può visualizzare"</em>.
                </div>`;
        }
    }

    function cityColor(name) {
        const n = name.toLowerCase();
        if (n.includes('tokyo'))    return 'tokyo';
        if (n.includes('kyoto'))    return 'kyoto';
        if (n.includes('osaka'))    return 'osaka';
        if (n.includes('kanazawa')) return 'kanazawa';
        if (n.includes('programma')) return 'programma';
        return '';
    }

    let tabNames = [];

    function renderTabs() {
        const HIDE_TABS = ['Tokyo 20 marzo', 'Kanazawa - Itinerari', 'Kyoto - Itinerari'];
        const dataNames  = Object.keys(allData);
        const mapNames   = Object.keys(MAPS);
        const mapTableNames = Object.keys(MAPS_WITH_TABLE);
        const multiNames = Object.keys(MULTI_MAPS);
        tabNames = [...dataNames, ...mapNames, ...mapTableNames, ...multiNames, '🗣️ Parole Utili']
            .filter(n => !HIDE_TABS.includes(n));
        document.getElementById('tabs').innerHTML = tabNames.map((n, i) => {
            const city = cityColor(n);
            return `<div class="tab${i === 0 ? ' active' : ''}" ${city ? `data-city="${city}"` : ''} onclick="switchTab('${n}', this)">${n}</div>`;
        }).join('');
        if (tabNames.length) switchTab(tabNames[0]);
    }



    function switchTab(name, el) {
        currentSheet = name;
        currentData  = allData[name] || [];
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (el) el.classList.add('active');
        else document.querySelector('.tab')?.classList.add('active');
        document.getElementById('search').value = '';
        if (name === '🗣️ Parole Utili') {
            renderJapanese();
        } else if (MAPS[name]) {
            renderMap(MAPS[name]);
        } else if (name === 'Shopping') {
            renderShopping(currentData);
        } else if (MAPS_WITH_TABLE[name]) {
            const cfg = MAPS_WITH_TABLE[name];
            renderMapWithTable(cfg.mid, allData[cfg.sheet] || [], cfg.hasGroups || false);
        } else if (MULTI_MAPS[name]) {
            renderMultiMap(MULTI_MAPS[name], allData['Tokyo 20 marzo'] || []);
        } else if (name === 'Programma Finale') {
            renderProgramma(currentData);
        } else if (name === 'Ristoranti confermati') {
            const sorted = [...currentData].sort((a, b) => {
                const da = parseFloat(a['Booking'] || 0);
                const db = parseFloat(b['Booking'] || 0);
                return da - db;
            });
            renderCards(sorted);
        } else {
            renderCards(currentData);
        }
    }

    function renderMap(mid) {
        document.getElementById('content').innerHTML = `
            <div class="map-container">
                <iframe src="https://www.google.com/maps/d/embed?mid=${mid}&ehbc=2E312F" allowfullscreen></iframe>
            </div>`;
    }

    function renderMapWithTable(mid, rows, hasGroups) {
        function buildSimpleTable(rows) {
            if (!rows.length) return '';
            return `<div class="table-wrap"><table class="itin-table">
                <thead><tr>
                    <th>Data</th><th>Da</th><th>Ora</th><th>A</th><th>Ora</th><th>Mezzo</th><th>Note</th>
                </tr></thead>
                <tbody>
                ${rows.map(row => `<tr>
                    <td>${excelDateToString(row['Data'])}</td>
                    <td>${String(row['Partenza'] || '').trim()}</td>
                    <td>${excelTimeToString(row['Orario di Partenza'])}</td>
                    <td>${String(row['Arrivo'] || '').trim()}</td>
                    <td>${excelTimeToString(row['Orario di Arrivo'])}</td>
                    <td>${String(row['Mezzo'] || '').trim()}</td>
                    <td>${String(row['Note'] || '').trim()}</td>
                </tr>`).join('')}
                </tbody>
            </table></div>`;
        }

        function buildGroupTable(rows) {
            if (!rows.length) return '';
            // Raggruppa per colonna Gruppo
            const groups = {};
            rows.forEach(row => {
                const g = String(row['Gruppo'] || '').trim();
                if (!g) return;
                if (!groups[g]) groups[g] = [];
                const partenza = String(row['Partenza'] || '').trim();
                const orarioP  = excelTimeToString(row['Orario Partenza']);
                const arrivo   = String(row['Arrivo'] || '').trim();
                const orarioA  = excelTimeToString(row['Orario Arrivo']);
                const mezzo    = String(row['Mezzo'] || '').trim();
                const note     = String(row['Note'] || '').trim();
                if (partenza || arrivo) groups[g].push({ partenza, orarioP, arrivo, orarioA, mezzo, note });
            });
            return Object.entries(groups).map(([g, gRows]) => `
                <div class="map-option-title" style="background:#e6f4ea;color:#137333;margin-top:8px;">Gruppo ${g}</div>
                <table class="itin-table">
                    <thead><tr>
                        <th>Da</th><th>Ora</th><th>A</th><th>Ora</th><th>Mezzo</th><th>Note</th>
                    </tr></thead>
                    <tbody>
                    ${gRows.map(r => `<tr>
                        <td>${r.partenza}</td><td>${r.orarioP}</td>
                        <td>${r.arrivo}</td><td>${r.orarioA}</td>
                        <td>${r.mezzo}</td><td>${r.note}</td>
                    </tr>`).join('')}
                    </tbody>
                </table>`).join('');
        }

        const tableHtml = hasGroups ? buildGroupTable(rows) : buildSimpleTable(rows);

        document.getElementById('content').innerHTML = `
            <div class="multi-map">
                <div class="map-option">
                    ${tableHtml}
                    <iframe src="https://www.google.com/maps/d/embed?mid=${mid}&ehbc=2E312F" allowfullscreen></iframe>
                </div>
            </div>`;
    }

    function excelTimeToString(value) {
        if (!value) return '';
        if (isNaN(value)) return String(value).trim();
        // Gli orari in Excel sono frazioni di giorno (0.5 = 12:00)
        const totalMinutes = Math.round(Number(value) * 24 * 60);
        const hh = String(Math.floor(totalMinutes / 60)).padStart(2, '0');
        const mm = String(totalMinutes % 60).padStart(2, '0');
        return `${hh}:${mm}`;
    }

    function renderMultiMap(options, sheetRows) {
        // Colonna 'Gruppo' con valori 1/2/3 per separare i 3 itinerari
        const groups = { 1: [], 2: [], 3: [] };
        sheetRows.forEach(row => {
            const gruppo  = parseInt(row['Gruppo'] || '0');
            if (!gruppo || !groups[gruppo]) return;
            const partenza = String(row['Partenza'] || '').trim();
            const orarioP  = excelTimeToString(row['Orario Partenza']);
            const arrivo   = String(row['Arrivo'] || '').trim();
            const orarioA  = excelTimeToString(row['Orario Arrivo']);
            const mezzo    = String(row['Mezzo'] || '').trim();
            const note     = String(row['Note'] || '').trim();
            if (partenza || arrivo) {
                groups[gruppo].push({ partenza, orarioP, arrivo, orarioA, mezzo, note });
            }
        });

        function buildTable(rows) {
            if (!rows.length) return '';
            return `<div class="table-wrap"><table class="itin-table">
                <thead><tr>
                    <th>Da</th><th>Ora</th><th>A</th><th>Ora</th><th>Mezzo</th><th>Note</th>
                </tr></thead>
                <tbody>
                ${rows.map(r => `<tr>
                    <td>${r.partenza}</td>
                    <td>${r.orarioP}</td>
                    <td>${r.arrivo}</td>
                    <td>${r.orarioA}</td>
                    <td>${r.mezzo}</td>
                    <td>${r.note}</td>
                </tr>`).join('')}
                </tbody>
            </table></div>`;
        }

        document.getElementById('content').innerHTML = `
            <div class="multi-map">
                ${options.map((o, i) => `
                <div class="map-option">
                    <div class="map-option-title">${o.label}</div>
                    ${buildTable(groups[i + 1])}
                    <iframe src="https://www.google.com/maps/d/embed?mid=${o.mid}&ehbc=2E312F" allowfullscreen></iframe>
                </div>`).join('')}
            </div>`;
    }

    function renderShopping(rows) {
        const el = document.getElementById('content');
        if (!rows.length) { el.innerHTML = '<div class="no-results">Nessun risultato trovato 🔍</div>'; return; }
        el.innerHTML = `
        <div style="padding:12px">
            <div class="table-wrap">
            <table class="itin-table">
                <thead><tr>
                    <th>🏙️ Città</th>
                    <th>🛍️ Store</th>
                    <th>🏷️ Tipo</th>
                    <th>💬 Note</th>
                </tr></thead>
                <tbody>
                ${rows.map(row => `<tr>
                    <td>${String(row['Città'] || '').trim()}</td>
                    <td><strong>${String(row['Store'] || '').trim()}</strong></td>
                    <td>${String(row['Tipo'] || '').trim()}</td>
                    <td>${String(row['Note'] || '').trim()}</td>
                </tr>`).join('')}
                </tbody>
            </table>
            </div>
        </div>`;
    }

    function filterCards() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        if (!q) return renderCards(currentData);
        const COLS = ['Città','Nome','Quartiere','Indirizzo','Tipo','Cat','Note'];
        renderCards(currentData.filter(row =>
            COLS.some(c => String(row[c] || '').toLowerCase().includes(q))
        ));
    }

    function val(row, key) { return String(row[key] || '').trim(); }

    function excelDateToString(value) {
        if (!value) return '';
        // Se è già una stringa leggibile, restituiscila com'è
        if (isNaN(value)) return String(value).trim();
        // Converti numero seriale Excel in data
        const date = XLSX.SSF.parse_date_code(Number(value));
        if (!date) return String(value);
        const dd = String(date.d).padStart(2, '0');
        const mm = String(date.m).padStart(2, '0');
        return `${dd}/${mm}/${date.y}`;
    }

    function renderCards(rows) {
        const el = document.getElementById('content');
        if (!rows.length) { el.innerHTML = '<div class="no-results">Nessun risultato trovato 🔍</div>'; return; }

        el.innerHTML = rows.map(row => {
            const nome      = val(row, 'Nome')      || '—';
            const citta     = val(row, 'Città');
            const quartiere = val(row, 'Quartiere');
            const indirizzo = val(row, 'Indirizzo');
            const distanza  = val(row, 'Distanza');
            const chiusura  = val(row, 'Chiusura');
            const tipo      = val(row, 'Tipo');
            const cat       = val(row, 'Cat');
            const costo     = val(row, 'Costo');
            const note      = val(row, 'Note');
            const mappa     = val(row, 'Mappa');
            const link      = val(row, 'Link');
            const booking   = excelDateToString(row['Booking']);

            const badges = [
                tipo      ? `<span class="badge badge-tipo">${tipo}</span>`       : '',
                cat       ? `<span class="badge badge-cat">${cat}</span>`         : '',
                costo     ? `<span class="badge badge-costo">💶 ${costo}</span>`  : '',
                distanza  ? `<span class="badge badge-dist">📍 ${distanza}</span>`: '',
            ].join('');

            const details = [
                quartiere ? `🏘️ ${quartiere}` : '',
                indirizzo ? `🏠 ${indirizzo}` : '',
                chiusura  ? `🚫 Chiuso: ${chiusura}` : '',
            ].filter(Boolean).join('&nbsp; · &nbsp;');

            const actions = [
                mappa   ? `<a href="${mappa}"   class="btn btn-maps"    target="_blank">📍 Naviga</a>`   : '',
                mappa   ? `<a href="${mappa}"   class="btn btn-gmaps"   target="_blank">🗺️ Maps</a>`     : '',
                link    ? `<a href="${link}"    class="btn btn-web"     target="_blank">🌐 Sito</a>`     : '',
            ].filter(Boolean).join('');

            return `
            <div class="card">
                <div class="card-top">
                    <span class="card-name">${nome}</span>
                    ${citta ? `<span class="card-city">${citta}</span>` : ''}
                </div>
                ${badges  ? `<div class="badges">${badges}</div>`           : ''}
                ${details ? `<div class="card-details">${details}</div>`    : ''}
                ${booking ? `<div class="note">🏨 ${booking}</div>`         : ''}
                ${note    ? `<div class="note">💬 ${note}</div>`            : ''}
                ${actions ? `<div class="card-actions">${actions}</div>`    : ''}
            </div>`;
        }).join('');
    }

    function renderProgramma(rows) {
        const el = document.getElementById('content');
        if (!rows.length) { el.innerHTML = '<div class="no-results">Nessun risultato trovato 🔍</div>'; return; }

        el.innerHTML = rows.map(row => {
            const data      = excelDateToString(row['Data']);
            const citta     = val(row, 'Città');
            const hotel     = val(row, 'Hotel');
            const orari     = val(row, 'Orari');
            const note1     = val(row, 'Note 1');
            const remarks   = val(row, 'Remarks');
            const todo      = val(row, 'TO DO');
            const ristorante= val(row, 'Ristorante');
            const cosaFare  = val(row, 'Cosa Fare');
            const tipo      = val(row, 'Tipo');
            const note      = val(row, 'Note');

            const details = [
                hotel      ? `🏨 ${hotel}`        : '',
                orari      ? `🕐 ${orari}`         : '',
                cosaFare   ? `🗺️ ${cosaFare}`      : '',
                ristorante ? `🍽️ ${ristorante}`    : '',
                tipo       ? `🏷️ ${tipo}`          : '',
            ].filter(Boolean).join('&nbsp; · &nbsp;');

            return `
            <div class="card">
                <div class="card-top">
                    <span class="card-name">${data || '—'}</span>
                    ${citta ? `<span class="card-city">${citta}</span>` : ''}
                </div>
                ${details  ? `<div class="card-details">${details}</div>`    : ''}
                ${todo     ? `<div class="note">✅ ${todo}</div>`            : ''}
                ${remarks  ? `<div class="note">📌 ${remarks}</div>`        : ''}
                ${note1    ? `<div class="note">💬 ${note1}</div>`           : ''}
                ${note     ? `<div class="note">💬 ${note}</div>`            : ''}
            </div>`;
        }).join('');
    }

    loadData();
</script>
